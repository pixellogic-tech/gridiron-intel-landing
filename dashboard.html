<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Dashboard - Gridiron Intel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: rgba(30, 41, 59, 0.8);
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { margin: 0; }
        .btn {
            background: linear-gradient(135deg, #16a34a, #10b981);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-danger {
            background: rgba(239, 68, 68, 0.3);
            border: 1px solid #ef4444;
            color: #fca5a5;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label { color: #94a3b8; }
        .content-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        .player-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .player-number {
            font-size: 2rem;
            font-weight: bold;
            color: #4ade80;
            margin-bottom: 10px;
        }
        .invite-code {
            background: rgba(22, 163, 74, 0.2);
            color: #4ade80;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.75rem;
            margin-top: 10px;
            display: inline-block;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        .empty-state i { font-size: 4rem; margin-bottom: 20px; }
        
        /* Film Analysis Styles */
        .analysis-step {
            padding: 10px;
            color: #94a3b8;
            border-radius: 8px;
            margin-bottom: 5px;
        }
        .analysis-step i { margin-right: 10px; }
        #uploadArea:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #4ade80;
        }
        .film-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .film-info h4 { margin: 0 0 5px 0; }
        .film-info p {
            color: #94a3b8;
            font-size: 0.875rem;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>🏈 Coach Dashboard</h1>
                <p style="color: #94a3b8; margin-top: 5px;">Welcome back, <span id="coachName">Coach</span>!</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="addPlayer()">
                    <i class="fas fa-user-plus"></i> Add Player
                </button>
                <button class="btn btn-danger" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div style="font-size: 3rem; margin-bottom: 10px;">👥</div>
                <div class="stat-number" id="playerCount">0</div>
                <div class="stat-label">Total Players</div>
            </div>
            <div class="stat-card">
                <div style="font-size: 3rem; margin-bottom: 10px;">🎬</div>
                <div class="stat-number" id="filmCount">0</div>
                <div class="stat-label">Game Films</div>
            </div>
            <div class="stat-card">
                <div style="font-size: 3rem; margin-bottom: 10px;">🎯</div>
                <div class="stat-number">87%</div>
                <div class="stat-label">AI Accuracy</div>
            </div>
            <div class="stat-card">
                <div style="font-size: 3rem; margin-bottom: 10px;">🏆</div>
                <div class="stat-number">0-0</div>
                <div class="stat-label">Season Record</div>
            </div>
        </div>

        <!-- Film Analysis Section -->
        <div class="content-card">
            <h2 style="margin-bottom: 20px;">Game Film Analysis</h2>
            
            <!-- Upload Area -->
            <div id="uploadArea" style="
                border: 2px dashed rgba(255, 255, 255, 0.2);
                border-radius: 10px;
                padding: 40px;
                text-align: center;
                margin-bottom: 20px;
                cursor: pointer;
            " onclick="document.getElementById('filmInput').click()">
                <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; color: #4ade80; margin-bottom: 15px;"></i>
                <p>Drag & drop game film here or click to browse</p>
                <p style="color: #94a3b8; font-size: 0.875rem; margin-top: 5px;">Supports MP4, MOV, AVI up to 5GB</p>
                <input type="file" id="filmInput" accept="video/*" style="display: none;" onchange="handleFilmUpload(event)">
            </div>

            <!-- Films List -->
            <div id="filmsList">
                <!-- Films will be listed here -->
            </div>
        </div>

        <!-- Players List -->
        <div class="content-card">
            <h2 style="margin-bottom: 20px;">Team Roster</h2>
            <div id="playersList" class="players-grid">
                <!-- Players will appear here -->
            </div>
        </div>
    </div>

    <!-- Film Analysis Modal -->
    <div id="analysisModal" style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 1000;
    ">
        <div style="
            background: linear-gradient(135deg, #1e293b, #0f172a);
            max-width: 800px;
            margin: 40px auto;
            border-radius: 15px;
            padding: 30px;
        ">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Film Analysis</h2>
                <button onclick="closeAnalysisModal()" style="
                    background: none;
                    border: none;
                    color: #94a3b8;
                    font-size: 1.5rem;
                    cursor: pointer;
                ">&times;</button>
            </div>
            
            <div id="analysisProgress">
                <div style="margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span>Analyzing Film...</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div style="
                        background: rgba(255, 255, 255, 0.1);
                        border-radius: 10px;
                        height: 10px;
                        overflow: hidden;
                    ">
                        <div id="progressBar" style="
                            width: 0%;
                            height: 100%;
                            background: linear-gradient(90deg, #16a34a, #4ade80);
                            transition: width 0.3s;
                        "></div>
                    </div>
                </div>
                
                <div id="analysisSteps" style="color: #94a3b8;">
                    <!-- Steps will be added here -->
                </div>
            </div>
            
            <div id="analysisResults" style="display: none;">
                <!-- Results will be shown here -->
            </div>
        </div>
    </div>

    <script>
        // ========== CHECK AUTH ==========
        const user = JSON.parse(localStorage.getItem('gridiron_user') || 'null');
        
        if (!user) {
            alert('Please login first');
            window.location.href = 'index.html';
        }

        // ========== INITIALIZE ==========
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Dashboard loaded');
            document.getElementById('coachName').textContent = user.name.split(' ')[0];
            loadDashboard();
        });

        // ========== LOAD DASHBOARD DATA ==========
        function loadDashboard() {
            const data = JSON.parse(localStorage.getItem('gridiron_dashboard') || '{"players":[],"films":[]}');
            
            // Update counts
            document.getElementById('playerCount').textContent = data.players?.length || 0;
            document.getElementById('filmCount').textContent = data.films?.length || 0;
            
            // Display players
            const playersList = document.getElementById('playersList');
            
            if (!data.players || data.players.length === 0) {
                playersList.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-users"></i>
                        <p>No players added yet</p>
                        <button class="btn" onclick="addPlayer()" style="margin-top: 20px;">
                            Add Your First Player
                        </button>
                    </div>
                `;
            } else {
                playersList.innerHTML = data.players.map(p => `
                    <div class="player-card">
                        <div class="player-number">#${p.jerseyNumber}</div>
                        <div style="font-weight: 600; margin-bottom: 5px;">${p.name}</div>
                        <div style="color: #94a3b8; margin-bottom: 10px;">${p.position}</div>
                        <div class="invite-code">Code: ${p.inviteCode}</div>
                    </div>
                `).join('');
            }

            // Display films
            const filmsList = document.getElementById('filmsList');
            if (filmsList) {
                const films = data.films || [];
                
                if (films.length === 0) {
                    filmsList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-film"></i>
                            <p>No films uploaded yet</p>
                            <button class="btn" onclick="document.getElementById('filmInput').click()" style="margin-top: 20px;">
                                Upload Your First Film
                            </button>
                        </div>
                    `;
                } else {
                    filmsList.innerHTML = films.map(film => `
                        <div class="film-item">
                            <div class="film-info">
                                <h4>vs ${film.opponent}</h4>
                                <p>Uploaded ${new Date(film.uploadDate).toLocaleDateString()}</p>
                            </div>
                            <button class="btn" onclick="viewAnalysis(${film.id})">
                                <i class="fas fa-chart-bar"></i> View Analysis
                            </button>
                        </div>
                    `).join('');
                }
            }
        }

        // ========== ADD PLAYER ==========
        function addPlayer() {
            const name = prompt('Enter player name:');
            if (!name) return;
            
            const number = prompt('Enter jersey number (0-99):');
            if (!number || isNaN(number)) {
                alert('Please enter a valid number');
                return;
            }
            
            const position = prompt('Enter position (QB, RB, WR, TE, OL, DL, LB, DB, K, P):');
            if (!position) return;
            
            const data = JSON.parse(localStorage.getItem('gridiron_dashboard') || '{"players":[],"films":[]}');
            
            if (!data.players) data.players = [];
            
            const newPlayer = {
                id: Date.now(),
                name
