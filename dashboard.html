
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Dashboard - Gridiron Intel</title>
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>🏈 Coach Dashboard</h1>
                <p class="header-subtitle">Welcome back, <span id="coachName">Coach</span>!</p>
            </div>
            <div class="header-actions">
                <button class="btn" onclick="addPlayer()">
                    <i class="fas fa-user-plus"></i> Add Player
                </button>
                <button class="btn btn-danger" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-details">
                    <div class="stat-number" id="playerCount">0</div>
                    <div class="stat-label">Total Players</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎬</div>
                <div class="stat-details">
                    <div class="stat-number" id="filmCount">0</div>
                    <div class="stat-label">Game Films</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-details">
                    <div class="stat-number">87%</div>
                    <div class="stat-label">AI Accuracy</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🏆</div>
                <div class="stat-details">
                    <div class="stat-number">0-0</div>
                    <div class="stat-label">Season Record</div>
                </div>
            </div>
        </div>

        <!-- Film Analysis Section -->
        <div class="content-card">
            <h2>🎥 Game Film Analysis</h2>
            
            <!-- Upload Area -->
            <div id="uploadArea" class="upload-area" onclick="document.getElementById('filmInput').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Drag & drop game film here or click to browse</p>
                <p class="upload-subtitle">Supports MP4, MOV, AVI up to 5GB</p>
                <input type="file" id="filmInput" accept="video/*" style="display: none;" onchange="handleFilmUpload(event)">
            </div>

            <!-- Films List -->
            <div id="filmsList"></div>
        </div>

        <!-- Players List -->
        <div class="content-card">
            <h2>👥 Team Roster</h2>
            <div id="playersList" class="players-grid"></div>
        </div>
    </div>

    <!-- Film Analysis Modal -->
    <div id="analysisModal" class="modal">
        <div class="modal-content analysis-modal">
            <div class="modal-header">
                <h2>Film Analysis</h2>
                <button onclick="closeAnalysisModal()" class="close-btn">&times;</button>
            </div>
            
            <div id="analysisProgress">
                <div class="progress-info">
                    <span>Analyzing Film...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                
                <div id="analysisSteps"></div>
            </div>
            
            <div id="analysisResults" style="display: none;"></div>
        </div>
    </div>

    <!-- Add Player Modal -->
    <div id="addPlayerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Player</h2>
                <button onclick="closeModal('addPlayerModal')" class="close-btn">&times;</button>
            </div>
            
            <form onsubmit="submitAddPlayer(event)">
                <div class="form-group">
                    <label>Player Name</label>
                    <input type="text" id="playerName" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Jersey Number</label>
                        <input type="number" id="jerseyNumber" min="0" max="99" required>
                    </div>
                    <div class="form-group">
                        <label>Position</label>
                        <select id="playerPosition" required>
                            <option value="">Select Position</option>
                            <option value="QB">Quarterback (QB)</option>
                            <option value="RB">Running Back (RB)</option>
                            <option value="WR">Wide Receiver (WR)</option>
                            <option value="TE">Tight End (TE)</option>
                            <option value="OL">Offensive Line (OL)</option>
                            <option value="DL">Defensive Line (DL)</option>
                            <option value="LB">Linebacker (LB)</option>
                            <option value="DB">Defensive Back (DB)</option>
                            <option value="K">Kicker (K)</option>
                            <option value="P">Punter (P)</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="btn">Add Player</button>
            </form>
        </div>
    </div>

    <script src="assets/js/dashboard.js"></script>
</body>
</html>
