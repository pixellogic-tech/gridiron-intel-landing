<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Dashboard - Gridiron Intel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
    ">
        <div style="text-align: center; color: white;">
            <div style="font-size: 3rem; margin-bottom: 20px;">🏈</div>
            <div style="font-size: 1.5rem; font-weight: bold;">Loading Dashboard...</div>
        </div>
    </div>

    <!-- Main Dashboard (Hidden initially) -->
    <div id="mainDashboard" style="display: none; min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);">
        
        <!-- Sidebar -->
        <div id="sidebar" style="
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            z-index: 100;
        ">
            <!-- Logo -->
            <div style="display: flex; align-items: center; gap: 10px; padding-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
                <span style="font-size: 2rem;">🏈</span>
                <span style="font-size: 1.2rem; font-weight: bold; color: white;">Gridiron Intel</span>
            </div>

            <!-- User Info -->
            <div style="padding: 20px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
                <div style="
                    width: 50px;
                    height: 50px;
                    border-radius: 50%;
                    background: linear-gradient(135deg, #16a34a, #10b981);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-size: 1.5rem;
                    margin-bottom: 10px;
                ">
                    <i class="fas fa-user"></i>
                </div>
                <div id="userName" style="font-weight: 600; color: white; margin-bottom: 5px;">Coach Name</div>
                <div id="userRole" style="font-size: 0.875rem; color: #94a3b8;">Head Coach</div>
            </div>

            <!-- Navigation -->
            <div style="flex: 1; padding: 20px 0; overflow-y: auto;">
                <a href="#" onclick="showSection('overview'); return false;" class="nav-item active" data-section="overview" style="
                    display: flex;
                    align-items: center;
                    gap: 15px;
                    padding: 12px 15px;
                    margin: 5px 0;
                    border-radius: 10px;
                    color: white;
                    text-decoration: none;
                    background: linear-gradient(135deg, #16a34a, #10b981);
                ">
                    <i class="fas fa-home" style="width: 20px;"></i>
                    <span>Overview</span>
                </a>

                <a href="#" onclick="showSection('players'); return false;" class="nav-item" data-section="players" style="
                    display: flex;
                    align-items: center;
                    gap: 15px;
                    padding: 12px 15px;
                    margin: 5px 0;
                    border-radius: 10px;
                    color: #94a3b8;
                    text-decoration: none;
                ">
                    <i class="fas fa-users" style="width: 20px;"></i>
                    <span>Players</span>
                    <span id="playerBadge" style="
                        margin-left: auto;
                        background: #ef4444;
                        padding: 2px 8px;
                        border-radius: 10px;
                        font-size: 0.75rem;
                        color: white;
                    ">0</span>
                </a>

                <a href="#" onclick="showSection('films'); return false;" class="nav-item" data-section="films" style="
                    display: flex;
                    align-items: center;
                    gap: 15px;
                    padding: 12px 15px;
                    margin: 5px 0;
                    border-radius: 10px;
                    color: #94a3b8;
                    text-decoration: none;
                ">
                    <i class="fas fa-video" style="width: 20px;"></i>
                    <span>Film Room</span>
                </a>

                <a href="#" onclick="showSection('predictions'); return false;" class="nav-item" data-section="predictions" style="
                    display: flex;
                    align-items: center;
                    gap: 15px;
                    padding: 12px 15px;
                    margin: 5px 0;
                    border-radius: 10px;
                    color: #94a3b8;
                    text-decoration: none;
                ">
                    <i class="fas fa-brain" style="width: 20px;"></i>
                    <span>AI Predictions</span>
                </a>

                <a href="#" onclick="showSection('schedule'); return false;" class="nav-item" data-section="schedule" style="
                    display: flex;
                    align-items: center;
                    gap: 15px;
                    padding: 12px 15px;
                    margin: 5px 0;
                    border-radius: 10px;
                    color: #94a3b8;
                    text-decoration: none;
                ">
                    <i class="fas fa-calendar" style="width: 20px;"></i>
                    <span>Schedule</span>
                </a>
            </div>

            <!-- Logout Button -->
            <div style="padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1);">
                <button onclick="logout()" style="
                    width: 100%;
                    padding: 12px;
                    background: rgba(239, 68, 68, 0.2);
                    border: 1px solid #ef4444;
                    color: #fca5a5;
                    border-radius: 10px;
                    cursor: pointer;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    gap: 10px;
                ">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div style="margin-left: 260px; min-height: 100vh;">
            
            <!-- Top Bar -->
            <div style="
                background: rgba(30, 41, 59, 0.8);
                padding: 20px 30px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                display: flex;
                justify-content: space-between;
                align-items: center;
            ">
                <div id="pageTitle" style="font-size: 1.5rem; font-weight: 600; color: white;">Dashboard Overview</div>
                <button onclick="addPlayer()" style="
                    background: linear-gradient(135deg, #16a34a, #10b981);
                    border: none;
                    color: white;
                    padding: 10px 20px;
                    border-radius: 8px;
                    cursor: pointer;
                    font-weight: 600;
                    display: flex;
                    align-items: center;
                    gap: 8px;
                ">
                    <i class="fas fa-user-plus"></i>
                    <span>Add Player</span>
                </button>
            </div>

            <!-- Content Area -->
            <div style="padding: 30px;">

                <!-- OVERVIEW SECTION -->
                <div id="section-overview" class="content-section" style="display: block;">
                    <h2 style="color: white; margin-bottom: 20px;">Welcome back, <span id="coachNameDisplay">Coach</span>!</h2>
                    
                    <!-- Stats Grid -->
                    <div style="
                        display: grid;
                        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                        gap: 20px;
                        margin-bottom: 30px;
                    ">
                        <!-- Total Players -->
                        <div style="
                            background: rgba(30, 41, 59, 0.5);
                            border: 1px solid rgba(255, 255, 255, 0.1);
                            border-radius: 15px;
                            padding: 25px;
                        ">
                            <div style="display: flex; align-items: center; gap: 20px;">
                                <div style="
                                    width: 60px;
                                    height: 60px;
                                    border-radius: 15px;
                                    background: linear-gradient(135deg, #667eea, #764ba2);
                                    display: flex;
                                    align-items: center;
                                    justify-content: center;
                                    font-size: 1.5rem;
                                ">
                                    <i class="fas fa-users"></i>
                                </div>
                                <div>
                                    <div id="totalPlayers" style="font-size: 2rem; font-weight: bold; color: white;">0</div>
                                    <div style="color: #94a3b8; font-size: 0.875rem;">Total Players</div>
                                </div>
                            </div>
                        </div>

                        <!-- Total Films -->
                        <div style="
                            background: rgba(30, 41, 59, 0.5);
                            border: 1px solid rgba(255, 255, 255, 0.1);
                            border-radius: 15px;
                            padding: 25px;
                        ">
                            <div style="display: flex; align-items: center; gap: 20px;">
                                <div style="
                                    width: 60px;
                                    height: 60px;
                                    border-radius: 15px;
                                    background: linear-gradient(135deg, #f093fb, #f5576c);
                                    display: flex;
                                    align-items: center;
                                    justify-content: center;
                                    font-size: 1.5rem;
                                ">
                                    <i class="fas fa-film"></i>
                                </div>
                                <div>
                                    <div id="totalFilms" style="font-size: 2rem; font-weight: bold; color: white;">0</div>
                                    <div style="color: #94a3b8; font-size: 0.875rem;">Game Films</div>
                                </div>
                            </div>
                        </div>

                        <!-- AI Accuracy -->
                        <div style="
                            background: rgba(30, 41, 59, 0.5);
                            border: 1px solid rgba(255, 255, 255, 0.1);
                            border-radius: 15px;
                            padding: 25px;
                        ">
                            <div style="display: flex; align-items: center; gap: 20px;">
                                <div style="
                                    width: 60px;
                                    height: 60px;
                                    border-radius: 15px;
                                    background: linear-gradient(135deg, #4facfe, #00f2fe);
                                    display: flex;
                                    align-items: center;
                                    justify-content: center;
                                    font-size: 1.5rem;
                                ">
                                    <i class="fas fa-chart-line"></i>
                                </div>
                                <div>
                                    <div style="font-size: 2rem; font-weight: bold; color: white;">87%</div>
                                    <div style="color: #94a3b8; font-size: 0.875rem;">AI Accuracy</div>
                                </div>
                            </div>
                        </div>

                        <!-- Season Record -->
                        <div style="
                            background: rgba(30, 41, 59, 0.5);
                            border: 1px solid rgba(255, 255, 255, 0.1);
                            border-radius: 15px;
                            padding: 25px;
                        ">
                            <div style="display: flex; align-items: center; gap: 20px;">
                                <div style="
                                    width: 60px;
                                    height: 60px;
                                    border-radius: 15px;
                                    background: linear-gradient(135deg, #43e97b, #38f9d7);
                                    display: flex;
                                    align-items: center;
                                    justify-content: center;
                                    font-size: 1.5rem;
                                ">
                                    <i class="fas fa-trophy"></i>
                                </div>
                                <div>
                                    <div style="font-size: 2rem; font-weight: bold; color: white;">0-0</div>
                                    <div style="color: #94a3b8; font-size: 0.875rem;">Season Record</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Quick Actions -->
                    <div style="
                        background: rgba(30, 41, 59, 0.5);
                        border: 1px solid rgba(255, 255, 255, 0.1);
                        border-radius: 15px;
                        padding: 25px;
                    ">
                        <h3 style="color: white; margin-bottom: 20px;">Quick Actions</h3>
                        <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                            <button onclick="addPlayer()" style="
                                background: linear-gradient(135deg, #16a34a, #10b981);
                                border: none;
                                color: white;
                                padding: 15px 30px;
                                border-radius: 10px;
                                cursor: pointer;
